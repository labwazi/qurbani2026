<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Taxi Mauritius Pro</title>

<link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css" />
<script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>
<script src="https://unpkg.com/leaflet-routing-machine@latest/dist/leaflet-routing-machine.js"></script>
<link rel="stylesheet" href="https://unpkg.com/leaflet-routing-machine@latest/dist/leaflet-routing-machine.css" />

<style>
body{font-family:Arial;margin:0;background:#f4f7f6}
.container{max-width:750px;margin:20px auto;background:#fff;padding:20px;border-radius:12px;box-shadow:0 4px 10px rgba(0,0,0,0.1)}
h2{text-align:center}
#map{height:350px;border-radius:10px;margin-bottom:15px}
input,select,textarea{width:100%;padding:10px;margin-top:5px;border-radius:6px;border:1px solid #ccc}
label{font-weight:bold}
button{margin-top:10px;padding:12px;border:none;border-radius:6px;cursor:pointer}
.primary{background:#25D366;color:#fff;font-weight:bold;width:100%}
.secondary{background:#3498db;color:#fff;width:100%}
.price{background:#eafaf1;padding:12px;text-align:center;font-weight:bold;margin-top:15px;border-radius:6px}
.quick{display:grid;grid-template-columns:repeat(2,1fr);gap:5px;margin-top:10px}
.quick button{background:#eee}
</style>
</head>

<body>
<div class="container">
<h2>🚖 Mauritius Taxi Booking</h2>

<div id="map"></div>

<label>Pickup</label>
<input id="pickup">
<button class="secondary" onclick="setCurrentLocation()">📍 Use My Location</button>

<label>Drop-off</label>
<input id="dropoff">

<div class="quick">
<button onclick="setPlace('SSR Airport')">Airport</button>
<button onclick="setPlace('Port Louis')">Port Louis</button>
<button onclick="setPlace('Grand Baie')">Grand Baie</button>
<button onclick="setPlace('Flic en Flac')">Flic en Flac</button>
<button onclick="setPlace('Curepipe')">Curepipe</button>
<button onclick="setPlace('Mahebourg')">Mahebourg</button>
</div>

<label>Date & Time</label>
<input type="datetime-local" id="datetime">

<label>Passengers</label>
<select id="passengers">
<option>1</option><option>2</option><option>3</option>
<option>4</option><option>5</option><option>6</option>
<option>7</option><option>8</option>
</select>

<label>Vehicle</label>
<select id="vehicle" onchange="calculatePrice()">
<option value="Standard">Standard</option>
<option value="SUV">SUV</option>
<option value="Premium">Premium</option>
</select>

<label>Notes</label>
<textarea id="notes"></textarea>

<div class="price" id="price">Estimated: MUR 0</div>

<button onclick="calculateRoute()" class="secondary">Calculate Route</button>
<button onclick="sendWhatsApp()" class="primary">Book via WhatsApp</button>
</div>

<script>
let map = L.map('map').setView([-20.2,57.5],11);

L.tileLayer('https://{s}.tile.openstreetmap.org/{z}/{x}/{y}.png').addTo(map);

let markerStart, markerEnd, control;
let distanceKm = 0;

const baseFare = 150;
const perKm = 45;

map.on('click', function(e){
if(!markerStart){
markerStart = L.marker(e.latlng).addTo(map);
document.getElementById('pickup').value = e.latlng.lat + ',' + e.latlng.lng;
} else if(!markerEnd){
markerEnd = L.marker(e.latlng).addTo(map);
document.getElementById('dropoff').value = e.latlng.lat + ',' + e.latlng.lng;
} else {
map.removeLayer(markerStart);
map.removeLayer(markerEnd);
markerStart = L.marker(e.latlng).addTo(map);
markerEnd = null;
document.getElementById('pickup').value = e.latlng.lat + ',' + e.latlng.lng;
document.getElementById('dropoff').value = '';
}
});

function setPlace(place){
document.getElementById('dropoff').value = place;
}

function setCurrentLocation(){
navigator.geolocation.getCurrentPosition(pos=>{
const latlng=[pos.coords.latitude,pos.coords.longitude];
if(markerStart) map.removeLayer(markerStart);
markerStart=L.marker(latlng).addTo(map);
document.getElementById('pickup').value=latlng.join(',');
});
}

async function geocode(place){
if(place.includes(',')){
let parts=place.split(',');
return [parseFloat(parts[0]),parseFloat(parts[1])];
}
const res=await fetch(`https://nominatim.openstreetmap.org/search?format=json&q=${place}, Mauritius`);
const data=await res.json();
if(data.length===0) return null;
return [parseFloat(data[0].lat),parseFloat(data[0].lon)];
}

async function calculateRoute(){
const p=document.getElementById('pickup').value;
const d=document.getElementById('dropoff').value;
if(!p||!d){alert('Select locations');return;}

const start=await geocode(p);
const end=await geocode(d);

if(!start||!end){alert('Location not found');return;}

if(control) map.removeControl(control);

control=L.Routing.control({waypoints:[L.latLng(start),L.latLng(end)]}).addTo(map);

control.on('routesfound', function(e){
const route=e.routes[0];
distanceKm=route.summary.totalDistance/1000;
calculatePrice();
});
}

function calculatePrice(){
if(distanceKm===0)return;

let mult=1;
const v=document.getElementById('vehicle').value;
if(v==='SUV') mult=1.5;
if(v==='Premium') mult=2;

let night=1;
const dt=document.getElementById('datetime').value;
if(dt){
const h=new Date(dt).getHours();
if(h>=22||h<6) night=1.2;
}

const total=Math.round(baseFare+distanceKm*perKm*mult*night);

document.getElementById('price').innerText='Estimated: MUR '+total;
document.getElementById('price').dataset.price=total;
}

function sendWhatsApp(){
const p=document.getElementById('pickup').value;
const d=document.getElementById('dropoff').value;
const dt=document.getElementById('datetime').value;
const pass=document.getElementById('passengers').value;
const veh=document.getElementById('vehicle').value;
const notes=document.getElementById('notes').value;
const price=document.getElementById('price').dataset.price||'TBC';

let msg='🚖 Taxi Booking%0A'+
'📍 Pickup: '+p+'%0A'+
'🏁 Drop: '+d+'%0A'+
'📅 Time: '+dt+'%0A'+
'👥 Pax: '+pass+'%0A'+
'🚗 Vehicle: '+veh+'%0A'+
'💰 Price: MUR '+price+'%0A';

if(notes) msg+='📝 Notes: '+notes;

window.open('https://wa.me/23059237053?text='+msg,'_blank');
}
</script>
</body>
</html>
