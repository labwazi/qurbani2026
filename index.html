<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Taxi Mauritius</title>

<link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css" />
<script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>
<script src="https://unpkg.com/leaflet-routing-machine@latest/dist/leaflet-routing-machine.js"></script>
<link rel="stylesheet" href="https://unpkg.com/leaflet-routing-machine@latest/dist/leaflet-routing-machine.css" />

<style>
body{font-family:Arial;margin:0;background:#f4f7f6}
.container{max-width:700px;margin:20px auto;background:#fff;padding:20px;border-radius:12px;box-shadow:0 4px 10px rgba(0,0,0,0.1)}
h2{text-align:center}
#map{height:300px;border-radius:10px;margin-bottom:15px}
input,select,textarea{width:100%;padding:10px;margin-top:5px;border-radius:6px;border:1px solid #ccc}
label{font-weight:bold}
button{margin-top:10px;padding:12px;border:none;border-radius:6px;cursor:pointer}
.primary{background:#25D366;color:#fff;font-weight:bold;width:100%}
.secondary{background:#3498db;color:#fff}
.price{background:#eafaf1;padding:12px;text-align:center;font-weight:bold;margin-top:15px;border-radius:6px}
</style>
</head>

<body>
<div class="container">
<h2>🚖 Mauritius Taxi Booking</h2>

<div id="map"></div>

<label>Pickup Location</label>
<input id="pickup" placeholder="Enter pickup village/town">

<label>Drop-off Location</label>
<input id="dropoff" placeholder="Enter destination">

<label>Date & Time</label>
<input type="datetime-local" id="datetime">

<label>Passengers</label>
<select id="passengers">
<option>1</option><option>2</option><option>3</option>
<option>4</option><option>5</option><option>6</option>
<option>7</option><option>8</option>
</select>

<label>Vehicle</label>
<select id="vehicle" onchange="calculatePrice()">
<option value="Standard">Standard</option>
<option value="SUV">SUV</option>
<option value="Premium">Premium</option>
</select>

<label>Notes</label>
<textarea id="notes"></textarea>

<div class="price" id="price">Estimated: MUR 0</div>

<button onclick="calculateRoute()" class="secondary">Calculate Route</button>
<button onclick="sendWhatsApp()" class="primary">Book via WhatsApp</button>
</div>

<script>
let map = L.map('map').setView([-20.3484,57.5522],10);

L.tileLayer('https://{s}.tile.openstreetmap.org/{z}/{x}/{y}.png', {
}).addTo(map);

let control;
let distanceKm = 0;

const baseFare = 150;
const perKm = 45;

async function geocode(place){
const res = await fetch(`https://nominatim.openstreetmap.org/search?format=json&q=${place}`);
const data = await res.json();
if(data.length===0) return null;
return [parseFloat(data[0].lat), parseFloat(data[0].lon)];
}

async function calculateRoute(){
const pickup = document.getElementById('pickup').value;
const dropoff = document.getElementById('dropoff').value;

if(!pickup || !dropoff){alert('Enter locations');return;}

const start = await geocode(pickup + ', Mauritius');
const end = await geocode(dropoff + ', Mauritius');

if(!start || !end){alert('Location not found');return;}

if(control) map.removeControl(control);

control = L.Routing.control({
waypoints: [L.latLng(start), L.latLng(end)],
routeWhileDragging: false
}).addTo(map);

control.on('routesfound', function(e){
const route = e.routes[0];
distanceKm = route.summary.totalDistance / 1000;
calculatePrice();
});
}

function calculatePrice(){
if(distanceKm===0) return;

let mult = 1;
const vehicle = document.getElementById('vehicle').value;
if(vehicle==='SUV') mult = 1.5;
if(vehicle==='Premium') mult = 2;

const hour = new Date(document.getElementById('datetime').value).getHours();
let night = (hour>=22 || hour<6)?1.2:1;

const total = Math.round(baseFare + distanceKm * perKm * mult * night);

document.getElementById('price').innerText = 'Estimated: MUR ' + total;
document.getElementById('price').dataset.price = total;
}

function sendWhatsApp(){
const p = document.getElementById('pickup').value;
const d = document.getElementById('dropoff').value;
const dt = document.getElementById('datetime').value;
const pass = document.getElementById('passengers').value;
const veh = document.getElementById('vehicle').value;
const notes = document.getElementById('notes').value;
const price = document.getElementById('price').dataset.price || 'TBC';

if(!p || !d){alert('Fill locations');return;}

let msg = '🚖 Taxi Booking%0A' +
'📍 Pickup: ' + p + '%0A' +
'🏁 Drop: ' + d + '%0A' +
'📅 Time: ' + dt + '%0A' +
'👥 Pax: ' + pass + '%0A' +
'🚗 Vehicle: ' + veh + '%0A' +
'💰 Price: MUR ' + price + '%0A';

if(notes) msg += '📝 Notes: ' + notes;

window.open('https://wa.me/23059237053?text=' + msg, '_blank');
}
</script>
</body>
</html>
