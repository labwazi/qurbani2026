<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>ARIGO</title>

<link rel="stylesheet" href="https://unpkg.com/leaflet/dist/leaflet.css"/>

<style>
body {
  margin:0;
  font-family: -apple-system, BlinkMacSystemFont, sans-serif;
  background:#0b1220;
  color:white;
}

/* layout */
#map {
  position:absolute;
  top:0;
  bottom:0;
  width:100%;
  z-index:1;
}

/* glass panel */
.panel {
  position:absolute;
  bottom:20px;
  left:50%;
  transform:translateX(-50%);
  width:95%;
  max-width:500px;
  background:rgba(20,30,50,0.85);
  backdrop-filter: blur(20px);
  border-radius:25px;
  padding:20px;
  z-index:2;
  box-shadow:0 20px 60px rgba(0,0,0,0.5);
}

/* header */
.title {
  font-size:18px;
  font-weight:600;
  opacity:0.8;
  margin-bottom:10px;
}

/* route display */
.route {
  font-size:14px;
  opacity:0.9;
}

.price {
  font-size:28px;
  font-weight:700;
  margin-top:10px;
  display:none;
}

/* button */
button {
  width:100%;
  margin-top:15px;
  padding:14px;
  border:none;
  border-radius:30px;
  background:#25D366;
  color:white;
  font-size:16px;
  font-weight:600;
}

/* taxi dots */
.taxi {
  width:6px;
  height:6px;
  background:#ffd54f;
  border-radius:50%;
  opacity:0.7;
}

</style>
</head>

<body>

<div id="map"></div>

<div class="panel">
  <div class="title">ARIGO • Mauritius</div>

  <div class="route">
    Pickup: <span id="pickup">Tap map</span><br>
    Dropoff: <span id="dropoff">Tap again</span>
  </div>

  <div class="price" id="price">Rs 0</div>

  <button onclick="book()">Book via WhatsApp</button>
</div>

<script src="https://unpkg.com/leaflet/dist/leaflet.js"></script>

<script>
let map = L.map('map',{zoomControl:false})
.setView([-20.28,57.57],10);

// dark theme map
L.tileLayer('https://{s}.basemaps.cartocdn.com/dark_all/{z}/{x}/{y}{r}.png').addTo(map);

// subtle taxi dots
for(let i=0;i<400;i++){
  let lat=-20.6+Math.random()*0.8;
  let lng=57.3+Math.random()*0.8;

  L.circleMarker([lat,lng],{
    radius:2,
    color:"#ffd54f",
    opacity:0.5
  }).addTo(map);
}

let pickup=null;
let dropoff=null;
let line=null;

map.on('click', function(e){

  if(!pickup){
    pickup=e.latlng;
    L.marker(pickup).addTo(map);
    document.getElementById("pickup").innerText="Selected";
  }

  else if(!dropoff){
    dropoff=e.latlng;
    L.marker(dropoff).addTo(map);
    document.getElementById("dropoff").innerText="Selected";

    drawLine();
    calculate();
  }

  else{
    location.reload(); // reset clean
  }
});

function drawLine(){
  if(line) map.removeLayer(line);

  line = L.polyline([pickup, dropoff], {
    color: "#25D366",
    weight: 4
  }).addTo(map);
}

function distance(a,b){
  const R=6371;
  const dLat=(b.lat-a.lat)*Math.PI/180;
  const dLon=(b.lng-a.lng)*Math.PI/180;

  const x=Math.sin(dLat/2)**2 +
    Math.cos(a.lat*Math.PI/180)*
    Math.cos(b.lat*Math.PI/180)*
    Math.sin(dLon/2)**2;

  return 2*R*Math.atan2(Math.sqrt(x),Math.sqrt(1-x));
}

function calculate(){
  let d = distance(pickup,dropoff);
  let fare = Math.min(d*100,2000);

  let priceEl = document.getElementById("price");
  priceEl.innerText = "Rs " + Math.round(fare);
  priceEl.style.display="block";
}

function book(){
  if(!pickup || !dropoff){
    alert("Select route");
    return;
  }

  let msg=`Taxi booking Mauritius:
Pickup selected
Dropoff selected
Price: ${document.getElementById("price").innerText}`;

  window.open("https://wa.me/23059237053?text="+encodeURIComponent(msg));
}
</script>

</body>
</html>
